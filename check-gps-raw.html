<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GPS 원본 데이터 확인</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        pre {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .image-data {
            margin: 20px 0;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 GPS 원본 메타데이터 확인</h1>
        <button class="button" onclick="checkGPS()">확인</button>
        <div id="results"></div>
    </div>

    <script>
        async function checkGPS() {
            const results = document.getElementById('results');
            results.innerHTML = '로딩 중...';

            try {
                const response = await fetch('http://localhost:3000/api/thermal-images/by-section/C-1');
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    let html = '<h2>최근 이미지 GPS 원본 데이터:</h2>';
                    
                    data.data.slice(0, 5).forEach(img => {
                        const metadata = img.metadata_json;
                        if (metadata && (metadata.GPSAltitude || metadata.GPSLatitude)) {
                            html += `
                                <div class="image-data">
                                    <h3>이미지 ID: ${img.image_id}</h3>
                                    <p><strong>촬영 시간:</strong> ${img.capture_timestamp}</p>
                                    <p><strong>현재 표시 고도:</strong> ${img.gps?.altitude || '없음'}</p>
                                    <h4>원본 GPS 메타데이터:</h4>
                                    <pre>${JSON.stringify({
                                        GPSLatitude: metadata.GPSLatitude,
                                        GPSLongitude: metadata.GPSLongitude,
                                        GPSAltitude: metadata.GPSAltitude,
                                        GPSAltitudeRef: metadata.GPSAltitudeRef,
                                        GPSLatitudeRef: metadata.GPSLatitudeRef,
                                        GPSLongitudeRef: metadata.GPSLongitudeRef,
                                    }, null, 2)}</pre>
                                </div>
                            `;
                        }
                    });

                    results.innerHTML = html;
                } else {
                    results.innerHTML = '<p>데이터가 없습니다.</p>';
                }
            } catch (error) {
                results.innerHTML = `<p style="color: red;">오류: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
